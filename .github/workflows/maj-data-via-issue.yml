name: MAJ data.json via issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update:
    # Sécurité : ne réagir qu'aux issues "MAD-UPDATE" créées par le propriétaire du dépôt
    if: >
      startsWith(github.event.issue.title, 'MAD-UPDATE') &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Extraire et valider le JSON du corps de l'issue
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$BODY" > /tmp/data.json
          python3 -c "import json; json.load(open('/tmp/data.json'))"

      - name: Archiver l'ancien MAD Actif dans history/ avant remplacement
        run: |
          mkdir -p history
          if [ -f data.json ]; then
            SIT=$(jq -r '.meta.situationAu // empty' data.json)
            if echo "$SIT" | grep -Eq '^[0-9]{2}-[0-9]{2}-[0-9]{4}$'; then
              KEY="${SIT:6:4}-${SIT:3:2}"
              TARGET="history/data_${KEY}.json"
              if [ ! -f "$TARGET" ]; then
                cp data.json "$TARGET"
                echo "Archivé : $TARGET"
              else
                echo "$TARGET existe déjà — ancien MAD Actif non ré-archivé (pas d'écrasement)."
              fi
              jq -n '[inputs | {
                id:      (input_filename | split("/") | last | rtrimstr(".json")),
                madName: ((.meta.madName // "") | sub("\\.xlsx?$"; "")),
                periode: (.meta.periode // ""),
                file:    input_filename
              }]' history/data_*.json > history/index.json
              jq empty history/index.json
            else
              echo "::warning::Ancien data.json sans meta.situationAu exploitable — pas d'archivage automatique dans history/."
            fi
          fi

      - name: Mettre à jour data.json et commiter
        run: |
          cp /tmp/data.json data.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          git commit -m "MAJ auto data.json via Power Automate - $(date -u +%FT%TZ)" || echo "Aucun changement"
          git push

      - name: Fermer l'issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --comment "✅ data.json mis à jour automatiquement. Dashboard actualisé."
