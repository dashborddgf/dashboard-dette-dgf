name: MAJ data.json via issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update:
    # Sécurité : ne réagir qu'aux issues "MAD-UPDATE" créées par le propriétaire du dépôt
    if: >
      startsWith(github.event.issue.title, 'MAD-UPDATE') &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Extraire et valider le JSON du corps de l'issue
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$BODY" > /tmp/data.json
          python3 -c "import json; json.load(open('/tmp/data.json'))"

      - name: Mettre à jour data.json et commiter
        run: |
          cp /tmp/data.json data.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "MAJ auto data.json via Power Automate - $(date -u +%FT%TZ)" || echo "Aucun changement"
          git push

      - name: Fermer l'issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --comment "✅ data.json mis à jour automatiquement. Dashboard actualisé."
